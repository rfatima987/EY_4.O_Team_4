  <line x1="115" y1="100" x2="130" y2="100" stroke="#2563eb" stroke-width="3" stroke-linecap="round"/>
  <!-- Decorative circles -->
  <circle cx="70" cy="100" r="4" fill="#2563eb"/>
  <circle cx="130" cy="100" r="4" fill="#2563eb"/>
</svg>