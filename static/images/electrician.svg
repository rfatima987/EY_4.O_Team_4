<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="electrician-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#electrician-gradient)" opacity="0.1"/>
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#electrician-gradient)" stroke-width="2"/>
  <!-- Lightbulb -->
  <path d="M 100 50 Q 115 50 120 65 Q 120 80 100 90 Q 80 80 80 65 Q 85 50 100 50" fill="#FFD700" stroke="#2563eb" stroke-width="2"/>
