  <!-- Bolt -->
  <path d="M 75 100 L 90 120 L 85 125 L 100 145 L 110 135 L 105 140 L 90 120" fill="#FFD700" stroke="#2563eb" stroke-width="2"/>
  <!-- Wire connections -->
