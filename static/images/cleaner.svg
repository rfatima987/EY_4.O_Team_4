<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cleaner-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#cleaner-gradient)" opacity="0.1"/>
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#cleaner-gradient)" stroke-width="2"/>
  <!-- Mop handle -->
  <rect x="95" y="40" width="10" height="75" rx="5" fill="#8B4513" stroke="#f59e0b" stroke-width="2"/>
  <!-- Mop head -->
  <circle cx="100" cy="130" r="20" fill="#FFD700" stroke="#f59e0b" stroke-width="2"/>
  <!-- Mop strings -->
  <line x1="85" y1="115" x2="80" y2="145" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  <line x1="95" y1="110" x2="90" y2="150" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  <line x1="105" y1="110" x2="110" y2="150" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  <line x1="115" y1="115" x2="120" y2="145" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  <!-- Cleaning sparkles -->
  <circle cx="130" cy="70" r="3" fill="#f59e0b"/>
  <circle cx="145" cy="85" r="2.5" fill="#f59e0b" opacity="0.7"/>
  <circle cx="150" cy="105" r="3" fill="#f59e0b"/>
  <!-- Shine lines -->
  <path d="M 128 68 L 132 72" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 143 83 L 147 87" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
</svg>