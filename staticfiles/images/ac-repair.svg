<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ac-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891B2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#ac-gradient)" opacity="0.1"/>
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#ac-gradient)" stroke-width="2"/>
  <!-- AC Unit -->
  <rect x="60" y="65" width="80" height="50" rx="5" fill="#E0E7FF" stroke="#06B6D4" stroke-width="2"/>
  <!-- Louvers/Grilles -->
  <line x1="70" y1="77" x2="130" y2="77" stroke="#06B6D4" stroke-width="1.5"/>
  <line x1="70" y1="85" x2="130" y2="85" stroke="#06B6D4" stroke-width="1.5"/>
  <line x1="70" y1="93" x2="130" y2="93" stroke="#06B6D4" stroke-width="1.5"/>
  <line x1="70" y1="101" x2="130" y2="101" stroke="#06B6D4" stroke-width="1.5"/>
  <!-- Control panel -->
  <rect x="65" y="120" width="70" height="15" rx="3" fill="#F3E8FF" stroke="#06B6D4" stroke-width="1.5"/>
  <!-- Buttons -->
  <circle cx="85" cy="127" r="3" fill="#06B6D4"/>
  <circle cx="100" cy="127" r="3" fill="#06B6D4"/>
  <circle cx="115" cy="127" r="3" fill="#06B6D4"/>
  <!-- Cold air indicator -->
  <path d="M 75 150 Q 75 160 70 165" fill="none" stroke="#06B6D4" stroke-width="2" stroke-linecap="round"/>
  <path d="M 100 150 Q 100 160 95 165" fill="none" stroke="#06B6D4" stroke-width="2" stroke-linecap="round"/>
  <path d="M 125 150 Q 125 160 120 165" fill="none" stroke="#06B6D4" stroke-width="2" stroke-linecap="round"/>
</svg>