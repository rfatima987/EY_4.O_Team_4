<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="plumber-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#plumber-gradient)" opacity="0.1"/>
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#plumber-gradient)" stroke-width="2"/>
  <!-- Pipe 1 (vertical) -->
  <rect x="85" y="50" width="12" height="60" rx="6" fill="#4A4A4A" stroke="#0f172a" stroke-width="2"/>
  <!-- Pipe 2 (horizontal) -->
  <rect x="70" y="105" width="60" height="12" rx="6" fill="#4A4A4A" stroke="#0f172a" stroke-width="2"/>
  <!-- Pipe 3 (vertical down) -->
  <rect x="121" y="110" width="12" height="50" rx="6" fill="#4A4A4A" stroke="#0f172a" stroke-width="2"/>
  <!-- Wrench -->
  <g transform="translate(100, 75)">
    <rect x="-35" y="-8" width="40" height="16" rx="8" fill="#FF6B35" stroke="#0f172a" stroke-width="2"/>
    <circle cx="5" cy="0" r="10" fill="none" stroke="#FF6B35" stroke-width="2"/>
  </g>
  <!-- Water droplets -->
  <path d="M 140 130 Q 135 142 140 150 Q 145 142 140 130" fill="#2563eb" stroke="#0f172a" stroke-width="1"/>
  <path d="M 160 140 Q 155 152 160 160 Q 165 152 160 140" fill="#2563eb" stroke="#0f172a" stroke-width="1" opacity="0.7"/>
</svg>