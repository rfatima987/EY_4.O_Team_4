<svg viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hero-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="glow-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1000" height="500" fill="url(#hero-gradient)"/>
  
  <!-- Floating circles for visual interest -->
  <circle cx="150" cy="100" r="80" fill="url(#glow-gradient)" filter="blur(40px)"/>
  <circle cx="850" cy="400" r="120" fill="url(#glow-gradient)" filter="blur(40px)"/>
  <circle cx="500" cy="250" r="100" fill="url(#glow-gradient)" filter="blur(50px)"/>
  
  <!-- Service tools illustration -->
  <!-- Left side tools -->
  <g opacity="0.3">
    <!-- Wrench -->
    <g transform="translate(100, 150)">
      <rect x="0" y="0" width="60" height="15" rx="7.5" fill="#2563eb"/>
      <circle cx="15" cy="7.5" r="12" fill="none" stroke="#2563eb" stroke-width="2"/>
      <rect x="55" y="-5" width="15" height="25" rx="3" fill="#2563eb"/>
    </g>
    <!-- Hammer -->
    <g transform="translate(80, 280)">
      <rect x="0" y="0" width="50" height="10" rx="5" fill="#f59e0b"/>
      <rect x="45" y="-15" width="12" height="40" rx="2" fill:#f59e0b"/>
      <rect x="42" y="-18" width="18" height="12" fill="#f59e0b"/>
    </g>
  </g>
  
  <!-- Right side tools -->
  <g opacity="0.3">
    <!-- Lightbulb -->
    <g transform="translate(850, 120)">
      <circle cx="0" cy="-15" r="20" fill="none" stroke="#2563eb" stroke-width="2"/>
      <path d="M -12 5 Q -15 20 -5 25 L 5 25 Q 15 20 12 5" fill="none" stroke="#2563eb" stroke-width="2"/>
      <line x1="-8" y1="25" x2="8" y2="25" stroke="#2563eb" stroke-width="2"/>
      <line x1="-7" y1="30" x2="7" y2="30" stroke="#2563eb" stroke-width="1.5"/>
    </g>
    <!-- Gear -->
    <g transform="translate(900, 300)">
      <circle cx="0" cy="0" r="25" fill="none" stroke="#f59e0b" stroke-width="2"/>
      <circle cx="0" cy="0" r="15" fill="none" stroke="#f59e0b" stroke-width="1"/>
      <rect x="-2" y="-28" width="4" height="8" fill="#f59e0b"/>
      <rect x="20" y="-15" width="8" height="4" fill="#f59e0b"/>
      <rect x="20" y="11" width="8" height="4" fill="#f59e0b"/>
      <rect x="-2" y="20" width="4" height="8" fill="#f59e0b"/>
      <rect x="-28" y="11" width="8" height="4" fill="#f59e0b"/>
      <rect x="-28" y="-15" width="8" height="4" fill="#f59e0b"/>
    </g>
  </g>
  
  <!-- Decorative lines -->
  <line x1="0" y1="0" x2="1000" y2="500" stroke="#2563eb" stroke-width="0.5" opacity="0.1"/>
  <line x1="1000" y1="0" x2="0" y2="500" stroke="#f59e0b" stroke-width="0.5" opacity="0.1"/>
</svg>