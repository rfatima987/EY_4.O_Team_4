<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mechanic-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EF4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DC2626;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#mechanic-gradient)" opacity="0.1"/>
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#mechanic-gradient)" stroke-width="2"/>
  <!-- Wrench -->
  <g transform="translate(60, 80)">
    <rect x="0" y="0" width="50" height="12" rx="6" fill="#333" stroke="#EF4444" stroke-width="2"/>
    <circle cx="10" cy="6" r="8" fill="none" stroke="#333" stroke-width="2"/>
    <rect x="42" y="-4" width="12" height="20" rx="2" fill="#666" stroke="#EF4444" stroke-width="1.5"/>
  </g>
  <!-- Gear teeth -->
  <g transform="translate(120, 110)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#333" stroke-width="2"/>
    <circle cx="0" cy="0" r="12" fill="none" stroke="#333" stroke-width="1"/>
    <!-- Teeth -->
    <rect x="-2" y="-20" width="4" height="6" fill="#333"/>
    <rect x="14" y="-12" width="6" height="4" fill="#333"/>
    <rect x="14" y="8" width="6" height="4" fill="#333"/>
    <rect x="-2" y="14" width="4" height="6" fill="#333"/>
    <rect x="-18" y="8" width="6" height="4" fill="#333"/>
    <rect x="-18" y="-12" width="6" height="4" fill="#333"/>
  </g>
  <!-- Spark effect -->
  <circle cx="140" cy="60" r="2" fill="#FFA500"/>
  <circle cx="155" cy="65" r="1.5" fill="#FFA500" opacity="0.7"/>
  <circle cx="160" cy="80" r="2" fill="#FFA500"/>
</svg>