<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="general-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#general-gradient)" opacity="0.1"/>
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#general-gradient)" stroke-width="2"/>
  <!-- Toolbox -->
  <rect x="55" y="70" width="90" height="50" rx="5" fill="#E0F2FE" stroke="#10B981" stroke-width="2"/>
  <!-- Toolbox lid detail -->
  <line x1="55" y1="85" x2="145" y2="85" stroke="#10B981" stroke-width="1.5"/>
  <!-- Handle -->
  <path d="M 75 70 Q 100 55 125 70" fill="none" stroke="#10B981" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Tools inside -->
  <!-- Wrench -->
  <rect x="70" y="90" width="15" height="5" rx="2.5" fill="#EF4444" stroke="#10B981" stroke-width="1"/>
  <!-- Screwdriver -->
  <rect x="95" y="95" width="3" height="20" fill="#FFA500" stroke="#10B981" stroke-width="0.5"/>
  <path d="M 93 95 L 97 95 L 95 93 Z" fill="#FFA500"/>
  <!-- Hammer -->
  <rect x="115" y="92" width="3" height="18" fill="#8B4513" stroke="#10B981" stroke-width="0.5"/>
  <rect x="110" y="88" width="13" height="8" fill="#696969" stroke="#10B981" stroke-width="1"/>
  <!-- Bottom section -->
  <rect x="65" y="118" width="70" height="10" rx="2" fill="#F0FDFA" stroke="#10B981" stroke-width="1.5"/>
</svg>