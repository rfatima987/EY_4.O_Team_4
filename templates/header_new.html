{% load static %}

<header class="header" role="banner">
    <!-- Main Navigation Bar -->
    <div class="header-container">
        <!-- Logo -->
        <div class="logo-section">
            <a href="{% url 'home' %}" class="logo-link" title="FixNear - Find Local Service Providers">
                <div class="logo-icon">F</div>
                <span class="logo-text">FixNear</span>
            </a>
        </div>

        <!-- Navigation Menu -->
        <nav class="main-nav" role="navigation" aria-label="Main Navigation">
            <ul class="nav-list">
                <li class="nav-item"><a href="{% url 'home' %}" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="{% url 'providers' %}" class="nav-link">Find Services</a></li>
                {% if user.is_authenticated %}
                    <li class="nav-item"><a href="{% url 'my_bookings' %}" class="nav-link">My Bookings</a></li>
                    <li class="nav-item"><a href="{% url 'provider_dashboard' %}" class="nav-link">Provider Dashboard</a></li>
                {% endif %}
                <li class="nav-item"><a href="#about" class="nav-link">About</a></li>
                <li class="nav-item"><a href="#contact" class="nav-link">Contact</a></li>
            </ul>
        </nav>

        <!-- User Actions -->
        <div class="user-actions">
            {% if user.is_authenticated %}
                <div class="dropdown-menu" id="userDropdown">
                    <button class="user-btn" id="userDropdownBtn" aria-label="User menu" aria-expanded="false">
                        <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                            <path d="M10 10c2.76 0 5-2.24 5-5S12.76 0 10 0 5 2.24 5 5s2.24 5 5 5zm0 2c-3.33 0-10 1.67-10 5v3h20v-3c0-3.33-6.67-5-10-5z"/>
                        </svg>
                        <span class="user-name">Profile</span>
                    </button>
                    <div class="dropdown-content" id="userDropdownContent">
                        <a href="{% url 'profile' %}" class="dropdown-link">My Profile</a>
                        <a href="{% url 'dashboard' %}" class="dropdown-link">Dashboard</a>
                        <a href="{% url 'settings' %}" class="dropdown-link">Settings</a>
                        <a href="{% url 'logout' %}" class="dropdown-link">Logout</a>
                    </div>
                </div>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-primary">Login</a>
                <a href="{% url 'signup' %}" class="btn btn-outline">Sign Up</a>
            {% endif %}
        </div>

        <!-- Mobile Menu Toggle -->
        <button class="menu-toggle" aria-label="Toggle menu" aria-expanded="false">
            <span class="hamburger"></span>
            <span class="hamburger"></span>
            <span class="hamburger"></span>
        </button>
    </div>

    <!-- Search Bar Section -->
    <div class="search-bar-section">
        <form class="search-container" role="search" method="GET" action="{% url 'providers' %}">
            <input 
                type="search" 
                class="search-input" 
                name="service"
                placeholder="Search services, electrician, plumber..." 
                aria-label="Search for services"
            >
            <button type="submit" class="search-btn" aria-label="Search">
                <svg width="18" height="18" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="2"/>
                    <path d="M12 12l6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </form>
    </div>

    <script>
        // Dropdown functionality
        document.addEventListener('DOMContentLoaded', function() {
            const userDropdownBtn = document.getElementById('userDropdownBtn');
            const userDropdown = document.getElementById('userDropdown');
            const userDropdownContent = document.getElementById('userDropdownContent');

            if (userDropdownBtn) {
                let isDropdownOpen = false;
                let hideDropdownTimeout;

                // Toggle dropdown on button click
                userDropdownBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    isDropdownOpen = !isDropdownOpen;
                    userDropdownContent.classList.toggle('show');
                    userDropdownBtn.setAttribute('aria-expanded', isDropdownOpen);
                    clearTimeout(hideDropdownTimeout);
                });

                // Keep dropdown visible when hovering over it
                userDropdown.addEventListener('mouseenter', function() {
                    clearTimeout(hideDropdownTimeout);
                });

                // Delay closing on mouseout so we don't close while transitioning
                userDropdown.addEventListener('mouseleave', function() {
                    if (isDropdownOpen) {
                        hideDropdownTimeout = setTimeout(function() {
                            // Only change if dropdown is still open
                            if (isDropdownOpen) {
                                // Don't auto-close on mouseleave - keep it open
                            }
                        }, 100);
                    }
                });

                // Close dropdown when clicking on a link, but allow navigation
                const dropdownLinks = userDropdownContent.querySelectorAll('.dropdown-link');
                dropdownLinks.forEach(link => {
                    link.addEventListener('click', function(e) {
                        // Allow default link behavior (navigation)
                        setTimeout(function() {
                            userDropdownContent.classList.remove('show');
                            userDropdownBtn.setAttribute('aria-expanded', 'false');
                            isDropdownOpen = false;
                        }, 100);
                    });
                });

                // Close dropdown when clicking outside the dropdown menu
                document.addEventListener('click', function(e) {
                    // Only close if we click outside AND dropdown is currently open
                    if (!userDropdown.contains(e.target) && isDropdownOpen) {
                        userDropdownContent.classList.remove('show');
                        userDropdownBtn.setAttribute('aria-expanded', 'false');
                        isDropdownOpen = false;
                    }
                });

                // Close dropdown on Escape key
                document.addEventListener('keydown', function(e) {
                    if (e.key === 'Escape' && isDropdownOpen) {
                        userDropdownContent.classList.remove('show');
                        userDropdownBtn.setAttribute('aria-expanded', 'false');
                        isDropdownOpen = false;
                    }
                });

                // Prevent closing dropdown when clicking on the dropdown content itself
                userDropdownContent.addEventListener('click', function(e) {
                    e.stopPropagation();
                });
            }
        });
    </script>
</header>
